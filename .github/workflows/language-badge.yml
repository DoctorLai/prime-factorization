name: Language Badge

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - index.html
      - scripts/update-language-badge.mjs
      - .github/workflows/language-badge.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-language-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update JavaScript percentage badge
        run: npm run badges:languages

      - name: Publish badge data to badges branch
        run: |
          set -euo pipefail

          badge_file="$RUNNER_TEMP/languages.json"
          worktree="$RUNNER_TEMP/badges-branch"

          cp badges/languages.json "$badge_file"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch origin badges
            git worktree add "$worktree" origin/badges
            git -C "$worktree" checkout -B badges
          else
            git worktree add --detach "$worktree"
            git -C "$worktree" checkout --orphan badges
            git -C "$worktree" rm -rf . || true
          fi

          cp "$badge_file" "$worktree/languages.json"
          git -C "$worktree" add languages.json

          if git -C "$worktree" diff --cached --quiet; then
            echo "No badge data changes to publish."
          else
            git -C "$worktree" commit -m "chore: update language badge data"
            git -C "$worktree" push origin badges
          fi
