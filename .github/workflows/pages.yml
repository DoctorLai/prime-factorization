name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          touch dist/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add /tmp/gh-pages origin/gh-pages
            git -C /tmp/gh-pages checkout -B gh-pages
            find /tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          else
            git worktree add --detach /tmp/gh-pages
            git -C /tmp/gh-pages checkout --orphan gh-pages
            git -C /tmp/gh-pages rm -rf . || true
          fi

          cp -R dist/. /tmp/gh-pages/
          git -C /tmp/gh-pages add --all

          if git -C /tmp/gh-pages diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
          else
            git -C /tmp/gh-pages commit -m "chore: deploy GitHub Pages"
            git -C /tmp/gh-pages push origin gh-pages
          fi
